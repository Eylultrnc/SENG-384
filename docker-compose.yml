version: '3.8'

services:
  
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: person_db
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  
  backend:
    build: ./backend
    ports:
      - "3000:3000"  
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/person_db
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3001:3001" 
    environment:
      - PORT=3001
    stdin_open: true
    tty: true
